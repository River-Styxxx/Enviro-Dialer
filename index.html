<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Enviromerica">
<meta name="theme-color" content="#06110b">
<title>Enviromerica Dialer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Familjen+Grotesk:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#06110b; --panel:#0d2016; --panel2:#102a1c; --panel3:#0a1a11;
  --line:#1c4230; --line2:#27583e;
  --ink:#e9f5ed; --dim:#9cc2aa; --faint:#688f78;
  --green:#34d178; --green-br:#62f29c; --green-deep:#0c6e3e;
  --rose:#ff5f8a; --rose-bg:#2a0f1a; --rose-soft:#ffd1de;
  --blue:#4aa6ff;
  --hot:#ff6b4a; --warm:#ffc24b; --cold:#5ab8ff; --appt:#7be0a8;
  --mono:"Spline Sans Mono",ui-monospace,monospace;
  --disp:"Bricolage Grotesque",sans-serif; --body:"Familjen Grotesk",sans-serif;
}
*{box-sizing:border-box}
html,body,#root{margin:0;min-height:100%}
body{background:radial-gradient(1100px 520px at 85% -8%,#0b271a 0%,transparent 55%),var(--bg);color:var(--ink);font-family:var(--body);font-size:15px;-webkit-font-smoothing:antialiased}
.wrap{max-width:760px;margin:0 auto;padding:max(14px, env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) 60px calc(12px + env(safe-area-inset-left))}
.muted{color:var(--faint)}
button{font-family:var(--body);cursor:pointer}

.daystrip{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;margin-bottom:8px}
.day{background:var(--panel3);border:1px solid var(--line);border-radius:11px;padding:8px 4px;text-align:center;position:relative}
.day .d{font-size:10.5px;letter-spacing:.06em;color:var(--faint);text-transform:uppercase;font-weight:600}
.day .n{font-family:var(--mono);font-size:18px;font-weight:600;margin-top:2px;color:var(--ink)}
.day.sel{background:#0d2f52;border-color:var(--blue)}
.day.sel .d{color:#bfe0ff}
.day.today .n{color:var(--green-br)}
.day.today::after{content:"";position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--green-br)}

.statrow{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 8px;text-align:center}
.stat .v{font-family:var(--mono);font-size:24px;font-weight:600;line-height:1}
.stat .k{font-size:11px;color:var(--faint);margin-top:4px}
.stat.due{background:var(--rose-bg);border-color:#5e2236}
.stat.due .v{color:var(--rose)}

.banner{display:flex;align-items:center;gap:10px;background:var(--rose-bg);border:1px solid #5e2236;border-radius:12px;padding:11px 13px;margin-bottom:8px}
.banner .txt{flex:1;font-size:13.5px;color:var(--rose-soft);line-height:1.35}
.banner .txt b{color:#fff}
.banner button{flex-shrink:0;background:transparent;border:1px solid var(--rose);color:var(--rose);font-weight:700;padding:8px 13px;border-radius:9px;font-size:13px}
.banner button:active{transform:scale(.97)}

.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.tab{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px;font-weight:600;font-size:14px;color:var(--dim);display:flex;align-items:center;justify-content:center;gap:7px}
.tab.on{background:var(--panel2);border-color:var(--green-deep);color:var(--ink)}
.tab.on.dial{border-color:var(--rose)}
.tab .ico{font-size:15px}
.tab.on.dial .ico{color:var(--rose)}

.subline{font-size:12.5px;color:var(--faint);font-family:var(--mono);margin:2px 2px 9px}
.subline b{color:var(--dim)}

.card{background:linear-gradient(180deg,var(--panel),var(--panel3));border:1px solid var(--line2);border-radius:16px;overflow:hidden}
.card.alert{border-color:#6a2a3d;box-shadow:0 0 0 1px rgba(255,95,138,.25)}
.chead{display:flex;gap:12px;padding:16px 16px 12px}
.who{flex:1;min-width:0}
.nm{font-family:var(--disp);font-weight:800;font-size:23px;letter-spacing:-.02em;line-height:1.05}
.badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:8px}
.b{font-family:var(--mono);font-size:11px;font-weight:500;padding:3px 8px;border-radius:7px;border:1px solid var(--line2);color:var(--dim)}
.b.appt{color:var(--appt);border-color:var(--green-deep)}
.b.fu{color:var(--green-br);border-color:var(--green-deep)}
.b.skip_perm{color:#c98;border-color:#5a4030}
.b.day{color:var(--dim)}
.b.due{background:var(--rose-bg);border-color:#6a2a3d;color:var(--rose)}
.b.temp-hot{background:var(--hot);border-color:var(--hot);color:#180802;font-weight:700}
.b.temp-warm{background:var(--warm);border-color:var(--warm);color:#181302;font-weight:700}
.b.temp-cold{background:var(--cold);border-color:var(--cold);color:#02111e;font-weight:700}
.city{font-family:var(--mono);font-size:12px;color:var(--faint);margin-top:7px}
.phonewrap{text-align:right;flex-shrink:0}
.phone{font-family:var(--disp);font-weight:700;font-size:25px;letter-spacing:-.02em;color:var(--green-br);text-decoration:none;line-height:1}
.phone-text{user-select:all;-webkit-user-select:all;cursor:text;display:inline-block}
.dialnow{display:inline-block;margin-top:7px;background:var(--green-deep);border:1px solid var(--green);color:#eafff2;font-family:var(--body);font-weight:700;font-size:12px;padding:5px 12px;border-radius:9px;text-decoration:none}
.dialnow:active{transform:scale(.96)}
.phone.dead{color:var(--rose);font-size:18px}
.ofc{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:5px}
.backups{font-family:var(--mono);font-size:11px;color:var(--dim);padding:0 16px 4px}
.backups a{color:var(--dim)}

/* coach panels */
.coach{margin:0 16px 12px;border:1px solid var(--line2);border-radius:12px;padding:11px 12px}
.coach.pre{border-left:3px solid var(--green);background:linear-gradient(180deg,rgba(52,209,120,.07),transparent)}
.coach.post{border-left:3px solid var(--rose);background:linear-gradient(180deg,rgba(255,95,138,.07),transparent)}
.coach .ch{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.coach .ttl{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--dim);font-weight:700}
.coach .tag{font-family:var(--mono);font-size:9px;color:#06140b;background:var(--green-br);border-radius:5px;padding:1px 6px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.coach.post .tag{background:var(--rose);color:#fff}
.coach .mode{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-bottom:7px}
.coach .line{font-size:13px;color:var(--dim);line-height:1.55}
.coach .line b{color:var(--ink);font-weight:600;display:inline-block;min-width:96px}
.coach .skel{color:var(--faint);font-style:italic}
.coach .cbtn{margin-top:9px;background:transparent;border:1px dashed var(--line2);color:var(--faint);font-size:12px;font-weight:600;padding:7px 12px;border-radius:9px}

.notes{margin:2px 16px 14px;background:var(--panel3);border:1px solid var(--line);border-radius:11px;padding:11px 12px}
.notes .lab{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:5px}
.notes .body{font-size:14px;color:var(--ink);line-height:1.4}
.notes .body.empty{color:var(--faint);font-style:italic}

.sec{padding:0 16px 14px}
.sec .lab{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:8px}

.ogrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.oc{background:var(--panel2);border:1px solid var(--line2);border-radius:11px;padding:11px 6px;font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.2;text-align:center;border-left:3px solid var(--occ,var(--line2))}
.oc:active{transform:scale(.97)}
.oc.sel{color:#fff;background:var(--occ);border-color:var(--occ)}
@media(max-width:560px){.ogrid{grid-template-columns:repeat(2,1fr)} .day .n{font-size:15px} .coach .line b{min-width:auto;display:block}}

.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{background:var(--panel3);border:1px solid var(--line2);border-radius:9px;padding:7px 11px;font-size:12.5px;font-weight:600;color:var(--dim)}
.chip:active{transform:scale(.96)}
.chip.seat.sel{background:var(--green-deep);border-color:var(--green);color:#eafff2}

.temps{display:flex;gap:7px}
.tmp{flex:1;background:var(--panel2);border:1px solid var(--line2);border-radius:11px;padding:10px;font-weight:700;font-size:13.5px;color:var(--dim)}
.tmp.sel.hot{background:var(--hot);border-color:var(--hot);color:#180802}
.tmp.sel.warm{background:var(--warm);border-color:var(--warm);color:#181302}
.tmp.sel.cold{background:var(--cold);border-color:var(--cold);color:#02111e}

.note{width:100%;background:var(--panel3);border:1px solid var(--line2);border-radius:11px;color:var(--ink);font-family:var(--body);font-size:14.5px;padding:11px 12px;resize:vertical;min-height:46px}
.note::placeholder{color:var(--faint)}
.nextrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.nextrow select,.nextrow input{background:var(--panel3);border:1px solid var(--line2);border-radius:10px;color:var(--ink);font-family:var(--mono);font-size:13px;padding:9px 10px}

.actions{display:flex;gap:8px;padding:4px 16px 8px}
.actions2{display:flex;gap:8px;padding:0 16px 16px}
.prev,.skip{flex:1;background:var(--panel2);border:1px solid var(--line2);color:var(--dim);font-weight:600;padding:11px 14px;border-radius:12px;font-size:13.5px}
.save{flex:1;background:var(--green);border:0;color:#04140a;font-family:var(--disp);font-weight:800;font-size:16px;padding:13px;border-radius:12px;letter-spacing:-.01em}
.next{flex:1;background:var(--green-deep);border:1px solid var(--green);color:#eafff2;font-family:var(--disp);font-weight:800;font-size:16px;padding:13px;border-radius:12px;letter-spacing:-.01em}
.save:disabled,.next:disabled{opacity:.4}
.save:active,.next:active{transform:scale(.99)}
.fu{margin-top:10px}
.fu .frow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fu select,.fu input{background:var(--panel);border:1px solid var(--line2);border-radius:9px;color:var(--ink);font-family:var(--mono);font-size:13px;padding:8px 10px}
.fu .appr{background:var(--rose);border:0;color:#fff;font-weight:700;padding:9px 14px;border-radius:9px;font-size:13px}
.fu .appr:active{transform:scale(.97)}
.fu .set{font-family:var(--mono);font-size:12.5px;color:var(--green-br);display:flex;align-items:center;gap:6px}
.fu .modetog{display:inline-flex;background:var(--panel);border:1px solid var(--line2);border-radius:9px;padding:3px;gap:3px}
.fu .mt{background:transparent;border:0;color:var(--dim);font-weight:600;font-size:12.5px;padding:6px 11px;border-radius:7px}
.fu .mt.on{background:var(--rose);color:#fff}
.fu .mt:disabled{opacity:.5}
.availline{font-family:var(--mono);font-size:11px;color:var(--faint);padding:0 16px 12px;margin-top:-4px}
.availline b{color:var(--green)}
/* contacts card */
.coach.contacts{border-left:3px solid var(--blue);background:linear-gradient(180deg,rgba(74,166,255,.06),transparent)}
.clist{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.cpill{font-family:var(--mono);font-size:12px;background:var(--panel);border:1px solid var(--line2);border-radius:8px;padding:4px 8px;color:var(--ink);display:inline-flex;align-items:center;gap:6px}
.cpill b{color:var(--blue);font-weight:600}
.cpill .cx{color:var(--faint);cursor:pointer;font-size:14px;line-height:1}
.cpill .cx:hover{color:var(--rose)}
.cadd{display:flex;gap:6px}
.cadd select{background:var(--panel);border:1px solid var(--line2);border-radius:8px;color:var(--ink);font-family:var(--body);font-size:13px;padding:7px 8px}
.cadd input{flex:1;background:var(--panel);border:1px solid var(--line2);border-radius:8px;color:var(--ink);font-family:var(--body);font-size:13.5px;padding:7px 10px}
.cadd input::placeholder{color:var(--faint)}
.cadd-btn{background:var(--panel2);border:1px solid var(--line2);color:var(--ink);font-weight:600;font-size:13px;padding:7px 12px;border-radius:8px}
.cadd-btn:active{transform:scale(.97)}
/* revisit / jumped */
.b.revisit{background:var(--blue);border-color:var(--blue);color:#04121f;font-weight:700}
.card.jumped{border-color:var(--blue);box-shadow:0 0 0 1px rgba(74,166,255,.25)}
.backlink{color:var(--blue);text-decoration:none}
/* snooze */
.droprow{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
.dropbtn{background:transparent;border:1px solid #6a5a2a;color:#e5cf86;font-weight:600;font-size:13px;padding:9px 13px;border-radius:9px}
.dropbtn:active{transform:scale(.97)}
.droprow .mini{display:block;font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:5px}
/* lookup + import */
.lookup{margin-bottom:10px;position:relative}
.lkrow{display:flex;gap:6px}
.lkin{flex:1;background:var(--panel);border:1px solid var(--line2);border-radius:11px;color:var(--ink);font-family:var(--mono);font-size:13px;padding:10px 12px}
.lkin::placeholder{color:var(--faint)}
.impbtn{background:var(--panel);border:1px solid var(--line2);color:var(--dim);font-size:16px;padding:0 13px;border-radius:11px}
.lkres{position:absolute;left:0;right:0;top:46px;z-index:50;background:var(--panel2);border:1px solid var(--line2);border-radius:11px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.lkitem{padding:10px 12px;cursor:pointer;display:flex;flex-direction:column;gap:2px;border-bottom:1px solid var(--line)}
.lkitem:last-child{border-bottom:0}
.lkitem:hover{background:var(--panel3)}
.lknm{font-weight:700;font-size:14px}
.lkmeta{font-family:var(--mono);font-size:11px;color:var(--faint)}
.imppanel{margin-top:8px;background:var(--panel2);border:1px solid var(--line2);border-radius:11px;padding:11px}
.imppanel .lab{font-size:11px;color:var(--faint);margin-bottom:6px}
.impta{width:100%;min-height:70px;background:var(--panel3);border:1px solid var(--line2);border-radius:9px;color:var(--ink);font-family:var(--mono);font-size:11px;padding:9px;resize:vertical;margin-bottom:8px}
.newleadbtn{width:100%;margin-top:9px;background:transparent;border:1px dashed var(--green-deep);color:var(--green-br);font-weight:600;font-size:13px;padding:10px;border-radius:10px}
.newleadbtn:active{transform:scale(.99)}
/* edit follow-up (re-open approved review) */
.futop{display:flex;align-items:center;gap:8px}
.fuedit{margin-left:auto;background:var(--panel2);border:1px solid var(--line2);color:var(--ink);font-weight:600;font-size:11.5px;padding:5px 11px;border-radius:8px}
.fuedit:active{transform:scale(.96)}
/* save-failed banner */
.savefail{position:sticky;top:0;z-index:80;background:#3a0f16;border:1px solid var(--danger);border-radius:12px;padding:11px 13px;margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sftxt{flex:1;font-size:13px;color:#ffd9df;line-height:1.35}
.sftxt b{color:#fff}
.sfbtns{display:flex;gap:7px}
.sfbtns button{background:transparent;border:1px solid var(--danger);color:#ffb3b3;font-weight:700;font-size:12.5px;padding:8px 12px;border-radius:9px;white-space:nowrap}
.sfbtns button:active{transform:scale(.96)}
.savingdot{position:fixed;bottom:26px;right:16px;z-index:70;font-family:var(--mono);font-size:10.5px;color:var(--faint);background:var(--panel);border:1px solid var(--line);padding:4px 9px;border-radius:8px;opacity:.8}
/* cooling / warm-back */
.b.cooling{background:#1a3a52;border-color:var(--cold);color:var(--cold);font-weight:700}
.row.cooling{box-shadow:inset 3px 0 0 var(--cold)}
.cooltag{font-family:var(--mono);font-size:9.5px;font-weight:700;background:#1a3a52;border:1px solid var(--cold);color:var(--cold);padding:1px 6px;border-radius:5px;margin-left:6px}
.b.closedtag{background:#3a2a0f;border-color:#7a5a1f;color:#e5c886;font-weight:700}
.closedtag2{font-family:var(--mono);font-size:9.5px;font-weight:700;background:#3a2a0f;border:1px solid #7a5a1f;color:#e5c886;padding:1px 6px;border-radius:5px;margin-left:6px}
/* answered/hour rate bar */
.ratebar{display:flex;gap:14px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 13px;margin-bottom:10px;font-family:var(--mono);font-size:12.5px;color:var(--dim)}
.ratebar b{color:var(--green-br);font-size:15px}
/* footer multi-button */
.foot{display:flex;gap:8px;justify-content:center;margin-top:18px;flex-wrap:wrap}
.foot button{background:var(--panel);border:1px solid var(--line);color:var(--faint);font-family:var(--mono);font-size:11px;padding:8px 13px;border-radius:9px}
.exportbox{margin-top:10px;background:var(--panel2);border:1px solid var(--line2);border-radius:11px;padding:11px}
.exhead{font-size:11.5px;color:var(--dim);margin-bottom:7px;line-height:1.4;position:relative;padding-right:20px}
.exclose{position:absolute;top:-2px;right:0;color:var(--faint);cursor:pointer;font-size:20px;line-height:1}
.exta{width:100%;min-height:120px;background:var(--panel3);border:1px solid var(--line2);border-radius:9px;color:var(--green-br);font-family:var(--mono);font-size:10.5px;padding:9px;resize:vertical;white-space:pre;overflow:auto}
.snaprow{display:flex;align-items:center;gap:8px;padding:7px 2px;border-bottom:1px solid var(--line)}
.snapt{flex:1;font-family:var(--mono);font-size:11.5px;color:var(--dim)}
.snapbtn{background:var(--green-deep);border:1px solid var(--green);color:#eafff2;font-weight:700;font-size:11.5px;padding:6px 12px;border-radius:8px}
.snapbtn:active{transform:scale(.96)}
/* email sent */
.logfu{margin-top:5px;font-family:var(--mono);font-size:11px;color:var(--green)}
/* 5-tab + toprow */
.tabs.five{grid-template-columns:repeat(5,1fr)}
.tabs.five .tab{padding:10px 4px;font-size:12.5px;gap:4px}
.tabs.six{grid-template-columns:repeat(6,1fr)}
.tabs.six .tab{padding:10px 3px;font-size:11.5px;gap:3px}
.emailgo{font-family:var(--mono);font-size:11px;color:var(--blue);white-space:nowrap}
.toprow{display:flex;gap:6px;align-items:flex-start;margin-bottom:10px}
.toprow .lookup{flex:1;margin-bottom:0}
.calbtn,.newbtn{background:var(--panel);border:1px solid var(--line2);color:var(--ink);font-weight:600;font-size:12.5px;padding:10px 11px;border-radius:11px;white-space:nowrap;align-self:stretch}
.newbtn{background:var(--green-deep);border-color:var(--green);color:#eafff2}
.calbtn:active,.newbtn:active{transform:scale(.97)}
/* hot list */
.hotrow{align-items:center}
.hottag{font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 7px;border-radius:7px;white-space:nowrap;min-width:62px;text-align:center}
.hottag.t0{background:var(--hot);color:#180802}
.hottag.t1{background:var(--warm);color:#181302}
.hottag.t2{background:var(--panel2);color:var(--dim);border:1px solid var(--line2)}
.sigtag{font-family:var(--mono);font-size:9.5px;font-weight:600;background:var(--panel2);border:1px solid var(--line2);color:var(--dim);padding:1px 6px;border-radius:5px;margin-left:6px}
/* appts */
.apptsec{margin-bottom:14px}
.apptsec .lab{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:700;margin:0 2px 7px}
.apptcard{background:var(--panel);border:1px solid var(--line2);border-radius:11px;padding:4px 4px 9px;margin-bottom:7px}
.markbtns{display:flex;gap:6px;padding:0 8px;flex-wrap:wrap}

// ============ INFRA: IndexedDB / schema / backups / sync (see core_infra) ===
// ============================================================================
// Enviromerica Dialer — Core infrastructure (storage / backups / sync / merge)
// Standalone, no React. Testable in node with fake-indexeddb.
// ============================================================================

const SCHEMA_VERSION = 2;
const DB_NAME = 'enviromerica';
const STORE = 'kv';

// ---- IndexedDB key-value layer -------------------------------------------
function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const r = tx.objectStore(STORE).get(key);
    r.onsuccess = () => {
      resolve(r.result);
      db.close();
    };
    r.onerror = () => {
      reject(r.error);
      db.close();
    };
  });
}
async function idbSet(key, val) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(val, key);
    tx.oncomplete = () => {
      resolve(true);
      db.close();
    };
    tx.onerror = () => {
      reject(tx.error);
      db.close();
    };
  });
}
async function idbDel(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(key);
    tx.oncomplete = () => {
      resolve(true);
      db.close();
    };
    tx.onerror = () => {
      reject(tx.error);
      db.close();
    };
  });
}
async function idbKeys() {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const r = tx.objectStore(STORE).getAllKeys();
    r.onsuccess = () => {
      resolve(r.result);
      db.close();
    };
    r.onerror = () => {
      reject(r.error);
      db.close();
    };
  });
}

// keys used
const K_DATA = 'crm:data'; // {schema, leads:[...], meta:{...}}
const K_SNAPS = 'crm:snaps'; // [{t,size}] index
const K_SNAP = t => 'crm:snap:' + t;
const K_POOL = (pool, slot) => 'crm:pool:' + pool + ':' + slot; // local record of pool files
const K_POOLPTR = pool => 'crm:poolptr:' + pool;
const K_CALLCOUNT = 'crm:callcount'; // counter for every-5-calls prompt
const K_LASTDAY = 'crm:lastday'; // last ISO day seen (for new-day backup)
const K_SUPA = 'crm:supa'; // {url, key} override

// ---- Schema versioning: ADDITIVE ONLY, never destructive ------------------
// Loading old data upgrades it by ADDING missing fields with safe defaults.
// NEVER removes, rewrites, or reshapes existing values. No auto day-reparse.
function upgradeLead(p) {
  const q = Object.assign({}, p);
  if (!Array.isArray(q.sources)) q.sources = q.source ? [q.source] : [];
  if (!Array.isArray(q.numbers)) q.numbers = [];
  q.numbers = q.numbers.map(n => Object.assign({
    label: 'Main office',
    status: 'good'
  }, n));
  if (!Array.isArray(q.contacts)) q.contacts = [];
  if (!Array.isArray(q.log)) q.log = [];
  if (q.lastEdited === undefined) q.lastEdited = null;
  if (q.deleted === undefined) q.deleted = false;
  if (q.isDemo === undefined) q.isDemo = false;
  if (q.hours === undefined) q.hours = null;
  if (q.lunchCall === undefined) q.lunchCall = false;
  if (q.society === undefined) q.society = (q.sources && q.sources.some(s => s.indexOf('Punjabi') >= 0)) ? 'Punjabi Dental Society' : (q.isDemo ? 'None' : 'None');
  if (q.email === undefined) q.email = null;
  if (q.temp === undefined || q.temp === null) q.temp = '';
  return q;
}
function upgradeData(raw, seedFn) {
  // raw can be: null, a bare array (legacy), or {schema, leads}
  if (raw == null) return null;
  let leads, meta;
  if (Array.isArray(raw)) {
    leads = raw;
    meta = {};
  } else {
    leads = raw.leads || [];
    meta = raw.meta || {};
  }
  leads = leads.map(upgradeLead);
  return {
    schema: SCHEMA_VERSION,
    leads,
    meta
  };
}

// ---- Safe load: NEVER overwrite real data with seed on a transient error --
async function loadData(seedFn) {
  let raw = null,
    hadError = false;
  try {
    raw = await idbGet(K_DATA);
  } catch (e) {
    hadError = true;
  }
  if (raw == null && !hadError) {
    // genuinely empty — first run. seed it.
    const seeded = {
      schema: SCHEMA_VERSION,
      leads: seedFn().map(upgradeLead),
      meta: {
        seededAt: new Date().toISOString()
      }
    };
    try {
      await idbSet(K_DATA, seeded);
    } catch (e) {}
    return seeded;
  }
  if (raw == null && hadError) {
    // could not read — DO NOT seed-overwrite. Return empty-safe; caller shows a notice.
    return {
      schema: SCHEMA_VERSION,
      leads: [],
      meta: {
        loadError: true
      }
    };
  }
  return upgradeData(raw, seedFn);
}

// ---- Snapshots: silent, rotating, capped at 4, internal (NOT files) -------
const SNAP_CAP = 4;
async function snapshot(dataObj) {
  const blob = JSON.stringify(dataObj);
  let idx = [];
  try {
    idx = (await idbGet(K_SNAPS)) || [];
  } catch (e) {}
  if (idx.length && idx[idx.length - 1].size === blob.length) return idx; // skip no-op
  const t = new Date().toISOString();
  try {
    await idbSet(K_SNAP(t), blob);
    idx.push({
      t,
      size: blob.length
    });
    while (idx.length > SNAP_CAP) {
      const old = idx.shift();
      try {
        await idbDel(K_SNAP(old.t));
      } catch (e) {}
    }
    await idbSet(K_SNAPS, idx);
  } catch (e) {}
  return idx;
}
async function listSnapshots() {
  try {
    return (await idbGet(K_SNAPS)) || [];
  } catch (e) {
    return [];
  }
}
async function readSnapshot(t) {
  try {
    const b = await idbGet(K_SNAP(t));
    return b ? JSON.parse(b) : null;
  } catch (e) {
    return null;
  }
}

// ---- Persist: immediate write + snapshot every change ---------------------
async function persistData(dataObj) {
  try {
    await idbSet(K_DATA, dataObj);
  } catch (e) {
    return false;
  }
  try {
    await snapshot(dataObj);
  } catch (e) {}
  return true;
}

// ---- File backup pools (rotation math) ------------------------------------
// Pool A: 4 slots, advance 1 each backup.
// Pool B: 2 slots, daily, writes both.
// Pool C: 3 slots, refresh, rotating PAIR (1+2 -> 2+3 -> 3+1), 3rd holds previous.
// We track a pointer per pool and record what was written locally (for transfer).
async function poolAdvanceA() {
  let ptr = 0;
  try {
    ptr = (await idbGet(K_POOLPTR('A'))) || 0;
  } catch (e) {}
  ptr = ptr % 4 + 1; // 1..4
  await idbSet(K_POOLPTR('A'), ptr);
  return [ptr];
}
function poolBSlots() {
  return [1, 2];
} // both daily files
async function poolAdvanceC() {
  // pair start rotates 1,2,3 ; pair = [start, start%3+1]
  let start = 0;
  try {
    start = (await idbGet(K_POOLPTR('C'))) || 0;
  } catch (e) {}
  start = start % 3 + 1; // 1..3
  await idbSet(K_POOLPTR('C'), start);
  const second = start % 3 + 1;
  return [start, second]; // two adjacent slots
}
// record pool file contents locally so they can be pushed/transferred
async function writePoolFiles(pool, slots, blob) {
  for (const s of slots) {
    try {
      await idbSet(K_POOL(pool, s), blob);
    } catch (e) {}
  }
}

// filename builders (iOS-safe: no slashes)
function poolFileName(pool, slot) {
  if (pool === 'A') return 'Enviromerica osha 4-12 CRM backup ' + slot;
  if (pool === 'B') return 'Enviromerica 4-12 osha CRM Daily Backup ' + slot;
  if (pool === 'C') return 'Enviromerica 4-12 osha CRM REFRESH backup ' + slot;
  return 'Enviromerica 4-12 CRM backup ' + slot;
}

// ---- Merge engine ---------------------------------------------------------
// Lists (logs, notes-as-log, contacts, numbers, sources) UNION; drop exact dupes.
// Single-value fields: most-recently-edited wins (lastEdited; null = oldest).
// Deletions: soft-delete; deleted=true wins if it's the newer edit.
function _dedupBy(arr, keyFn) {
  const seen = new Set();
  const out = [];
  for (const x of arr || []) {
    const k = keyFn(x);
    if (seen.has(k)) continue;
    seen.add(k);
    out.push(x);
  }
  return out;
}
function mergeLead(a, b) {
  // a, b are the same id from two sources
  if (!a) return b;
  if (!b) return a;
  const aT = a.lastEdited || '';
  const bT = b.lastEdited || '';
  const newer = bT > aT ? b : a; // recent wins for scalars
  const older = bT > aT ? a : b;
  const out = Object.assign({}, older, newer); // newer scalars override
  // lists: union both
  out.log = _dedupBy([...(a.log || []), ...(b.log || [])], l => l.date + '|' + (l.time || '') + '|' + (l.outcome || '') + '|' + (l.note || ''));
  out.contacts = _dedupBy([...(a.contacts || []), ...(b.contacts || [])], c => (c.title || '') + '|' + (c.name || ''));
  out.numbers = _dedupBy([...(a.numbers || []), ...(b.numbers || [])], n => n.phone);
  out.sources = _dedupBy([...(a.sources || []), ...(b.sources || [])], s => s);
  // deleted: if either side newer-marked deleted, respect newer
  out.deleted = newer.deleted === true ? true : newer.deleted === false ? false : a.deleted || b.deleted || false;
  return out;
}
function mergeLeadSets(localLeads, incomingLeads) {
  const byId = new Map();
